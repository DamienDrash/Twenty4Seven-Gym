<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e05d38" />
    <meta name="color-scheme" content="light dark" />
    <title>Twenty4Seven-Gym</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="assets/admin.css?v=8" />
    <script>
      // Prevent flash of wrong theme — runs before CSS paints
      (function() {
        var t = localStorage.getItem('t247_theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#app">Zum Inhalt springen</a>
    <main id="app"></main>
    <script src="assets/app.js?v=8" defer></script>
  </body>
</html>
